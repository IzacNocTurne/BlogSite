<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>블로그 홈</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <h1 class="my-4">블로그</h1>
    <a href="/post/new" class="btn btn-primary mb-3">새 게시물 작성</a>
    <div class="list-group">
        <div th:each="post : ${posts}" class="list-group-item list-group-item-action">
            <div class="d-flex w-100 justify-content-between">
                <h5 class="mb-1"><a th:href="@{/post/{id}(id=${post.id})}" th:text="${post.title}">게시물 제목</a></h5>
                <small th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">2025-01-01</small>
            </div>
            <p class="mb-1" th:text="${#strings.abbreviate(post.content, 150)}">게시물 내용 미리보기...</p>
            <a th:href="@{/post/edit/{id}(id=${post.id})}" class="btn btn-sm btn-secondary">수정</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
