<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 통계</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        #chart-container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            height: 350px;
        }
    </style>
</head>
<body>
<div class="container my-5">
    <h1 class="text-center fw-bold mb-4">관리자 통계</h1>
    <div class="mb-4 text-center">
        <a href="/" class="btn btn-secondary me-2">뒤로가기</a>
        <a href="/admin/stats/clear" class="btn btn-warning" onclick="return confirm('정말로 모든 통계 데이터를 초기화하시겠습니까? (이 작업은 되돌릴 수 없습니다.)');">통계 데이터 초기화</a>
    </div>

    <div class="row">
        <!-- 유입 경로 분포 카드 -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-dark text-white fw-bold py-3">
                    유입 경로 분포
                </div>
                <div class="card-body d-flex align-items-center justify-content-center" style="min-height: 380px;">
                    <div id="chart-container" class="w-100">
                        <canvas id="referralChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- 인기 유입 게시물 카드 -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-dark text-white fw-bold py-3">
                    인기 유입 게시물 Top 5
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle mb-0">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>제목</th>
                                <th>조회수</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="post : ${topPosts}">
                                <td th:text="${post.id}"></td>
                                <td>
                                    <a th:href="@{/post/{id}(id=${post.id})}" th:text="${post.title}" class="text-decoration-none text-dark fw-medium">제목</a>
                                </td>
                                <td th:text="${post.viewCount}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const chartLabels = /*[[${chartLabels}]]*/ [];
    const chartData = /*[[${chartData}]]*/ [];
    /*]]>*/

    const ctx = document.getElementById('referralChart').getContext('2d');
    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: chartLabels,
            datasets: [{
                label: '유입 횟수',
                data: chartData,
                backgroundColor: [
                    'rgba(255, 99, 132, 0.7)',
                    'rgba(54, 162, 235, 0.7)',
                    'rgba(255, 206, 86, 0.7)',
                    'rgba(75, 192, 192, 0.7)',
                    'rgba(153, 102, 255, 0.7)',
                    'rgba(255, 159, 64, 0.7)'
                ],
                borderColor: [
                    'rgba(255, 99, 132, 1)',
                    'rgba(54, 162, 235, 1)',
                    'rgba(255, 206, 86, 1)',
                    'rgba(75, 192, 192, 1)',
                    'rgba(153, 102, 255, 1)',
                    'rgba(255, 159, 64, 1)'
                ],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });
</script>

</body>
</html>
