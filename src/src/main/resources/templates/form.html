<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시물 작성/수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <h1 class="my-4" th:text="${post.id == null} ? '새 게시물 작성' : '게시물 수정'">게시물 작성</h1>
    <form th:action="@{/post}" th:object="${post}" method="post">
        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:field="*{createdAt}" />
        <div class="mb-3">
            <label for="title" class="form-label">제목</label>
            <input type="text" class="form-control" id="title" th:field="*{title}" required>
        </div>
        <div class="mb-3">
            <label for="content" class="form-label">내용</label>
            <textarea class="form-control" id="content" rows="10" th:field="*{content}" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">저장</button>
        <a href="/" class="btn btn-secondary">취소</a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
