name: Java CI/CD with Maven and GCP VM Deploy

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. GitHub 저장소에서 코드 체크아웃
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. JDK 11 설정 (프로젝트의 Java 버전에 맞춤)
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: 'maven' # Maven 의존성 라이브러리 캐싱으로 빌드 속도 단축

    # 3. Maven을 사용하여 빌드 및 테스트 수행 (JAR 파일 빌드)
    - name: Build with Maven
      run: ./mvnw clean package

    # 4. 빌드된 JAR 파일을 GCP VM 서버로 SCP 전송
    - name: Copy JAR file to GCP VM via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.GCP_VM_HOST }}
        username: ${{ secrets.GCP_VM_USERNAME }}
        key: ${{ secrets.GCP_VM_SSH_KEY }}
        port: 22
        source: "target/blog-0.0.1-SNAPSHOT.jar"
        target: "~/app"
        strip_components: 1 # 'target/' 폴더 경로를 떼어내고 파일만 전송

    # 5. SSH로 GCP VM에 원격 접속하여 애플리케이션 프로세스 재시작
    - name: SSH Remote Command Execution to Restart Application
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.GCP_VM_HOST }}
        username: ${{ secrets.GCP_VM_USERNAME }}
        key: ${{ secrets.GCP_VM_SSH_KEY }}
        port: 22
        script: |
          echo "==== Starting deployment on GCP VM ===="
          cd ~/app

          # 기존 8080 포트를 점유하고 있는 기존 자바 프로세스 확인 및 종료
          CURRENT_PID=$(lsof -t -i:8080 || true)
          if [ -z "$CURRENT_PID" ]; then
            # 포트 검색에 실패할 경우 파일명으로 다시 PID 검색
            CURRENT_PID=$(pgrep -f "blog-0.0.1-SNAPSHOT.jar" || true)
          fi

          if [ ! -z "$CURRENT_PID" ]; then
            echo "Stopping running Spring Boot application (PID: $CURRENT_PID)..."
            kill -15 $CURRENT_PID
            sleep 5
            # 정상 종료되지 않은 경우 강제 종료
            if ps -p $CURRENT_PID > /dev/null; then
              echo "Forcing termination (kill -9) on PID: $CURRENT_PID"
              kill -9 $CURRENT_PID
            fi
          else
            echo "No running application found."
          fi

          # 신규 JAR 백그라운드 구동 (nohup)
          # 필요에 따라 로컬 DB 파일 보존 및 GCS 환경 변수를 추가하여 기동할 수 있습니다.
          echo "Starting the new Spring Boot application..."
          nohup java -jar blog-0.0.1-SNAPSHOT.jar > app.log 2>&1 &

          echo "Deployment Completed Successfully!"
