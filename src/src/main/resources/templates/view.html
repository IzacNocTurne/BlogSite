<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${post.title}">게시물 제목</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <div th:if="${post != null}">
        <h1 class="my-4" th:text="${post.title}">게시물 제목</h1>
        <p class="text-muted">작성일: <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2025-01-01 12:00</span></p>
        <hr>
        <div th:text="${post.content}" style="white-space: pre-wrap;">
            게시물 내용입니다.
        </div>
        <hr>
        <a href="/" class="btn btn-secondary">목록으로</a>
        <a th:href="@{/post/edit/{id}(id=${post.id})}" class="btn btn-primary">수정</a>
        <form th:action="@{/post/delete/{id}(id=${post.id})}" method="post" class="d-inline" onsubmit="return confirm('정말로 삭제하시겠습니까?');">
            <button type="submit" class="btn btn-danger">삭제</button>
        </form>
    </div>
    <div th:if="${post == null}">
        <h1 class="my-4">게시물을 찾을 수 없습니다.</h1>
        <a href="/" class="btn btn-secondary">목록으로</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
