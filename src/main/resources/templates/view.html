<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${post != null} ? ${post.title} : '게시물 없음'">게시물 제목</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="nav-link fw-semibold d-inline-block me-3" href="/prologue">프롤로그</a>
        <a class="navbar-brand fw-bold" href="/">마이 블로그</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" href="/category/manage">카테고리 관리</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" href="/post/new">새 게시물 작성</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-3">
            <div class="card">
                <div class="card-header">
                    카테고리
                </div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item" th:each="category : ${categories}">
                        <a th:href="@{/category/{id}(id=${category.id})}" th:text="${category.name}" class="text-decoration-none text-dark">카테고리명</a>
                    </li>
                </ul>
            </div>
        </div>
        <div class="col-md-9">
            <div th:if="${post != null}">
                <div class="mb-2">
                    <a th:if="${post.category != null}" th:href="@{/category/{id}(id=${post.category.id})}" th:text="${post.category.name}" class="badge bg-secondary text-decoration-none">카테고리</a>
                </div>
                <h1 class="display-5" th:text="${post.title}">게시물 제목</h1>
                <div class="text-muted mb-4">
                    <span th:text="${post.author}">작성자</span> &middot; 
                    <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2025-01-01 12:00</span>
                </div>
                <hr>
                <div th:if="${post.imagePath != null}" class="mb-4">
                    <img th:src="@{/uploads/{imagePath}(imagePath=${post.imagePath})}" class="img-fluid" alt="게시물 이미지">
                </div>
                <div th:text="${post.content}" style="white-space: pre-wrap;" class="fs-5">
                    게시물 내용입니다.
                </div>
                <hr>
                <a href="/" class="btn btn-outline-secondary">목록으로</a>
                <span sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/post/edit/{id}(id=${post.id})}" class="btn btn-outline-primary">수정</a>
                    <form th:action="@{/post/delete/{id}(id=${post.id})}" method="post" class="d-inline" onsubmit="return confirm('정말로 삭제하시겠습니까?');">
                        <button type="submit" class="btn btn-outline-danger">삭제</button>
                    </form>
                </span>
            </div>
            <div th:if="${post == null}" class="alert alert-warning" role="alert">
                <h4 class="alert-heading">게시물을 찾을 수 없습니다.</h4>
                <p>요청하신 게시물이 존재하지 않거나 삭제되었습니다.</p>
                <hr>
                <a href="/" class="btn btn-secondary">홈으로 돌아가기</a>
            </div>
        </div>
    </div>
</div>

<footer class="footer mt-auto py-3 bg-light">
    <div class="container">
        <ul class="nav justify-content-center">
            <li class="nav-item"><a class="nav-link" href="/about">소개</a></li>
            <li class="nav-item"><a class="nav-link" href="/contact">연락처</a></li>
            <li class="nav-item"><a class="nav-link" href="/privacy">개인정보처리방침</a></li>
        </ul>
        <div class="text-center text-muted">
            &copy; 2026 마이 블로그
            <span class="ms-3">
                <a href="/rss" class="text-muted text-decoration-none small">RSS 피드</a> | 
                <a href="/sitemap.xml" class="text-muted text-decoration-none small">사이트맵</a>
            </span>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
