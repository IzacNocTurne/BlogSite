spring.application.name=blog
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Cloud Run에서는 /tmp 폴더에만 쓰기 권한이 있습니다.
spring.datasource.url=jdbc:h2:file:/tmp/blogdb
spring.jpa.hibernate.ddl-auto=update
# Cloud Run의 PORT 환경변수를 따르도록 설정
server.port=${PORT:8080}

# Google Cloud Storage Configuration
# If bucket-name is empty, the application falls back to local storage (uploads/)
gcp.storage.bucket-name=${GCP_STORAGE_BUCKET:}
gcp.storage.project-id=${GCP_PROJECT_ID:}
gcp.storage.credentials-path=${GCP_CREDENTIALS_PATH:}

